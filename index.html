<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>南山假日銷過報名系統</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-firestore-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<style>
    /* 全域字體與背景設定 */
    body {
        font-family: 'Noto Sans TC', sans-serif;
        background-color: #f4f7f6;
        color: #333;
        padding-top: 15px;
        padding-bottom: 40px;
    }

    /* 頂部 Header 漸層美化 */
    .header {
        background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
        color: white;
        padding: 25px 20px;
        margin-bottom: 25px;
        border-radius: 16px;
        box-shadow: 0 8px 20px rgba(30, 60, 114, 0.15);
    }
    .header h1 {
        font-weight: 700;
        font-size: 1.8rem;
        margin: 0;
        letter-spacing: 1px;
    }

    /* 卡片設計優化 (柔和陰影、大圓角) */
    .card {
        border: none;
        border-radius: 16px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        margin-bottom: 25px;
        overflow: hidden;
        transition: transform 0.2s ease;
    }
    .card-header {
        border-bottom: none;
        padding: 18px 20px;
        font-weight: 700;
        font-size: 1.1rem;
        letter-spacing: 0.5px;
    }
    .card-body {
        padding: 25px 20px;
    }

    /* 自訂各區塊的 Header 顏色 */
    .bg-primary { background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%) !important; color: #fff !important; }
    .bg-info { background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%) !important; color: #1a5632 !important; }
    .bg-success { background: linear-gradient(135deg, #0ba360 0%, #3cba92 100%) !important; color: #fff !important; }
    .bg-secondary { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%) !important; color: #fff !important; }

    /* 表單元素美化 */
    .form-label {
        font-weight: 700;
        color: #555;
        margin-bottom: 8px;
    }
    .form-control, .form-select {
        border-radius: 10px;
        padding: 12px 15px;
        border: 1px solid #dee2e6;
        box-shadow: none;
        transition: all 0.3s ease;
    }
    .form-control:focus, .form-select:focus {
        border-color: #4facfe;
        box-shadow: 0 0 0 0.25rem rgba(79, 172, 254, 0.25);
    }

    /* 按鈕美化 */
    .btn {
        border-radius: 10px;
        padding: 10px 20px;
        font-weight: 600;
        transition: all 0.2s;
    }
    .btn:active { transform: scale(0.97); }
    .input-group .btn { border-radius: 0 10px 10px 0; }

    /* 導覽列 (Tabs) 現代化設計 */
    .nav-tabs {
        border-bottom: none;
        background: white;
        padding: 10px;
        border-radius: 16px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.03);
        display: flex;
        gap: 8px;
        margin-bottom: 20px !important;
    }
    .nav-tabs .nav-item { flex: 1; }
    .nav-tabs .nav-link {
        border: none;
        border-radius: 10px;
        color: #6c757d;
        font-weight: 600;
        text-align: center;
        padding: 12px 0;
        width: 100%;
        transition: all 0.3s;
    }
    .nav-tabs .nav-link:hover {
        background-color: #f8f9fa;
        color: #4facfe;
    }
    .nav-tabs .nav-link.active {
        background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
        color: white;
        box-shadow: 0 4px 10px rgba(79, 172, 254, 0.3);
    }

    /* 針對 Android LINE WebView 的終極解法 (勿刪) */
    select.form-select {
        -webkit-appearance: auto !important;
        appearance: auto !important;
        background-image: none !important;
        cursor: pointer;
        touch-action: manipulation;
    }

    /* 其他小細節 */
    #previewContent, #queryResults, #registeredDatesContent, #queryRegistrationResults {
        background-color: white;
        padding: 20px;
        border-radius: 12px;
        border: 1px solid #edf2f7;
    }
    .registration-item {
        border-bottom: 1px solid #f0f0f0;
        padding: 15px 10px;
    }
    .registration-item:last-child { border-bottom: none; }
    
    .loading-spinner {
        display: inline-block;
        width: 1.2rem;
        height: 1.2rem;
        vertical-align: middle;
        border: 0.2em solid currentColor;
        border-right-color: transparent;
        border-radius: 50%;
        animation: spinner-border .75s linear infinite;
    }
    @keyframes spinner-border { to { transform: rotate(360deg); } }

    /* 手機版微調 */
    @media (max-width: 576px) {
        .header h1 { font-size: 1.5rem; }
        .card-body { padding: 20px 15px; }
        .btn { width: 100%; margin-bottom: 10px; }
        .d-md-flex .btn { margin-bottom: 10px; }
        .input-group { flex-direction: column; border-radius: 10px; }
        .input-group > .form-control { width: 100%; border-radius: 10px !important; margin-bottom: 8px; }
        .input-group > .btn { width: 100%; border-radius: 10px !important; }
    }

    /* 列印樣式維持原樣 */
    @media print {
        body * { visibility: hidden; margin: 0; padding: 0; }
        body.print-list #printListContent {
            visibility: visible; display: block !important; position: absolute;
            left: 0; top: 0; width: 100%; height: auto; background: white; margin: 0; padding: 15px;
        }
        body.print-list #printListContent * { visibility: visible; }
        .no-print { display: none !important; }
        table { width: 100%; border-collapse: collapse; margin-bottom: 15px; }
        th, td { padding: 8px; border: 1px solid #ddd; }
        h2, h4 { margin-top: 10px; margin-bottom: 15px; page-break-after: avoid; }
        tr { page-break-inside: avoid; page-break-after: auto; }
        .attendance-checkbox { width: 20px; height: 20px; margin: 0 auto; display: block; }
        .attendance-label { display: flex; align-items: center; justify-content: center; gap: 10px; }
    }
</style>
</head>
<body>
<div class="container" style="max-width: 800px;">

    <ul class="nav nav-tabs sticky-top" id="mainTabs">
        <li class="nav-item">
            <button class="nav-link active" data-target="#tabStudent"><i class="bi bi-pencil-square me-1"></i>報名表單</button>
        </li>
        <li class="nav-item">
            <button class="nav-link" data-target="#tabAdmin" onclick="showLoginModal(); return false;"><i class="bi bi-gear-fill me-1"></i>管理員</button>
        </li>
        <li class="nav-item" id="logoutTab" style="display: none;">
            <button class="nav-link text-danger" onclick="logout()"><i class="bi bi-box-arrow-right me-1"></i>登出</button>
        </li>
    </ul>

    <div class="header text-center">
        <h1><i class="bi bi-clipboard-check me-2"></i>南山假日銷過報名系統</h1>
        <p class="mb-0 mt-2" style="opacity: 0.8; font-size: 0.9rem;">快速報名、查詢銷過與生活輔導紀錄</p>
    </div>

    <div class="tab-main" id="tabStudent">
        
        <div class="card">
            <div class="card-header bg-primary">
                <i class="bi bi-ui-checks"></i> 填寫報名資料
            </div>
            <div class="card-body">
                <form id="registrationForm">
                    <div class="row mb-3">
                        <div class="col-md-12">
                            <label class="form-label" for="studentId">學生學號</label>
                            <div class="input-group">
                                <input class="form-control" id="studentId" placeholder="請輸入學號 (例: 1110001)" required type="text"/>
                                <button class="btn btn-outline-primary" type="button" id="checkStudentBtn"><i class="bi bi-search me-1"></i>確認學號</button>
                            </div>
                            <div class="mt-2" id="studentInfo" style="min-height: 50px;"></div>
                        </div>
                    </div>
                    
                    <div class="row mb-3">
                        <div class="col-md-6 mb-3 mb-md-0">
                            <label class="form-label" for="activityDate">實施日期</label>
                            <select class="form-select" id="activityDate" required="">
                                <option value="">請選擇日期</option>
                            </select>
                            <div class="mt-2 text-muted small" id="dateInfo"></div>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label" for="activityHours">實施時數</label>
                            <select class="form-select" id="activityHours" required="">
                                <option value="">請選擇時數</option>
                                <option value="2">2小時</option>
                                <option value="4">4小時</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="row mb-4">
                        <div class="col-md-12">
                            <label class="form-label" for="activityType">報名類別</label>
                            <select class="form-select" id="activityType" required="">
                                <option value="">請選擇類別</option>
                                <option value="銷過">銷過</option>
                                <option value="假日生活輔導">假日生活輔導</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="d-flex flex-column flex-md-row justify-content-md-end gap-2 mt-4">
                        <button class="btn btn-secondary px-4" type="reset"><i class="bi bi-eraser me-1"></i>清除重填</button>
                        <button class="btn btn-primary px-4 shadow-sm" id="previewBtn" type="button"><i class="bi bi-eye me-1"></i>預覽資料</button>
                    </div>
                </form>
            </div>
        </div>

        <div class="card" id="previewSection" style="display: none; border: 2px solid #3cba92;">
            <div class="card-header bg-success">
                <i class="bi bi-check2-circle"></i> 報名預覽確認
            </div>
            <div class="card-body">
                <div id="previewContent"></div>
                <div class="d-flex flex-column flex-md-row justify-content-md-end gap-2 mt-4">
                    <button class="btn btn-warning px-4" id="editBtn" type="button"><i class="bi bi-pencil me-1"></i>修改資料</button>
                    <button class="btn btn-success px-4 shadow-sm" id="confirmBtn" type="button"><i class="bi bi-send-check me-1"></i>確認提交</button>
                </div>
            </div>
        </div>

        <div class="card" id="queryRegistrationSection">
            <div class="card-header bg-info">
                <i class="bi bi-search"></i> 查詢個人報名記錄
            </div>
            <div class="card-body">
                <div class="input-group">
                    <input type="text" class="form-control" id="queryRegistrationId" placeholder="請輸入學號進行查詢">
                    <button class="btn btn-primary" type="button" id="queryRegistrationBtn"><i class="bi bi-search"></i></button>
                </div>
                <div id="queryRegistrationResults" style="display: none; margin-top: 15px;"></div>
            </div>
        </div>

        <div class="card" id="registeredDatesSection" style="display: none;">
            <div class="card-header bg-info">
                <i class="bi bi-list-ul"></i> 已報名記錄
            </div>
            <div class="card-body">
                <div id="registeredDatesContent"></div>
            </div>
        </div>

    </div> <div class="tab-main" id="tabAdmin" style="display: none;">
        <div class="card">
            <div class="card-header bg-secondary">
                <i class="bi bi-calendar-plus"></i> 管理實施日期
            </div>
            <div class="card-body">
                <div class="input-group mb-4">
                    <input class="form-control" id="newDateInput" type="date"/>
                    <button class="btn btn-success" id="addDateBtn"><i class="bi bi-plus-lg me-1"></i>新增日期</button>
                </div>
                <ul class="list-group list-group-flush border rounded-3 overflow-hidden" id="dateList"></ul>
            </div>
        </div>
        
        <div class="card">
            <div class="card-header bg-secondary text-white">
                <i class="bi bi-person-vcard"></i> 管理員資料查詢
            </div>
            <div class="card-body">
                <div class="row g-3 mb-4">
                    <div class="col-md-4">
                        <label class="form-label" for="queryStudentId">特定學號 (選填)</label>
                        <input class="form-control" id="queryStudentId" placeholder="輸入學號" type="text"/>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label" for="queryDate">特定日期</label>
                        <select class="
